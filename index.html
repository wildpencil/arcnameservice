<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANS — Arc Name Service</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    h1 { font-size: 2.5rem; margin-bottom: 8px; background: linear-gradient(90deg, #00ff88, #00aaff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.sub { color: #666; margin-bottom: 40px; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 32px; width: 100%; max-width: 480px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input { margin-bottom: 0; flex: 1; }
    .search-row button { width: auto; padding: 14px 20px; }
    input { width: 100%; padding: 14px 16px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; font-family: inherit; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #00ff88; }
    button { width: 100%; padding: 14px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; font-family: inherit; }
    button:hover { background: #00cc66; }
    .duration-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .duration-btn { flex: 1; padding: 10px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #888; font-size: 0.9rem; cursor: pointer; font-family: inherit; }
    .duration-btn.active { border-color: #00ff88; color: #00ff88; background: #0a2a1a; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 12px; }
    .badge.available { background: #0a2a1a; border: 1px solid #00ff88; color: #00ff88; }
    .badge.taken { background: #2a0a0a; border: 1px solid #ff4444; color: #ff4444; }
    .badge.checking { background: #0a1a2a; border: 1px solid #00aaff; color: #00aaff; }
    .price { color: #00ff88; font-size: 1rem; font-weight: bold; margin-bottom: 12px; }
    .status { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 0.9rem; display: none; }
    .status.ok { background: #0a2a1a; border: 1px solid #00ff88; color: #00ff88; display: block; }
    .status.err { background: #2a0a0a; border: 1px solid #ff4444; color: #ff4444; display: block; }
    .status.info { background: #0a1a2a; border: 1px solid #00aaff; color: #00aaff; display: block; }
    a { color: #00aaff; }
  </style>
</head>
<body>
  <h1>ANS</h1>
  <p class="sub">Arc Name Service — Testnet</p>
  <div class="card">
    <div class="search-row">
      <input id="nameInput" type="text" placeholder="yourname" />
      <button onclick="checkName()">Check</button>
    </div>
    <div id="badge" style="display:none"></div>
    <div id="durationRow" style="display:none; margin-top:12px;">
      <div class="duration-row">
        <button class="duration-btn active" id="btn1" onclick="selectDuration(1)">1 Year — 3 USDC</button>
        <button class="duration-btn" id="btn5" onclick="selectDuration(5)">5 Years — 15 USDC</button>
      </div>
    </div>
    <div class="price" id="priceInfo"></div>
    <button id="connectBtn" onclick="connect()" style="display:none">Connect Wallet to Register</button>
    <div class="status" id="status"></div>
  </div>
  <p style="margin-top:24px;color:#444;font-size:0.8rem">
    Need testnet funds? <a href="https://faucet.circle.com" target="_blank">faucet.circle.com</a>
  </p>
<script>
const REGISTRAR = "0xDf84F80fBA0523e9EEbB30EbC0673BC415FCe29E";
const ARC_CHAIN_ID = 5042002;
const ABI = [
  "function rentPrice(string name, uint256 duration) view returns (uint256)",
  "function register(string name, address owner, uint256 duration) payable returns (bytes32)",
  "function available(string name) view returns (bool)"
];
const RPC = "https://rpc.testnet.arc.network";
let provider, signer, registrar, connected = false;
let selectedYears = 1;
let currentName = '';

const nameInput = document.getElementById('nameInput');
const priceInfo = document.getElementById('priceInfo');
const connectBtn = document.getElementById('connectBtn');
const status = document.getElementById('status');
const badge = document.getElementById('badge');
const durationRow = document.getElementById('durationRow');

function showStatus(msg, type) { status.textContent = msg; status.className = 'status ' + type; }

function selectDuration(years) {
  selectedYears = years;
  document.getElementById('btn1').className = years === 1 ? 'duration-btn active' : 'duration-btn';
  document.getElementById('btn5').className = years === 5 ? 'duration-btn active' : 'duration-btn';
  const price = years === 1 ? '3 USDC' : '15 USDC';
  priceInfo.textContent = 'Total: ' + price;
  if (connected) {
    connectBtn.textContent = 'Register ' + currentName + '.arc — ' + price;
  }
}

async function checkName() {
  const name = nameInput.value.trim().toLowerCase();
  if (!name || name.length < 3) {
    badge.style.display = 'none';
    priceInfo.textContent = '';
    durationRow.style.display = 'none';
    connectBtn.style.display = 'none';
    showStatus('Min 3 characters', 'err');
    return;
  }
  if (!/^[a-z0-9-]+$/.test(name)) {
    showStatus('Only lowercase letters, numbers, hyphens', 'err');
    return;
  }
  currentName = name;
  badge.style.display = 'block';
  badge.className = 'badge checking';
  badge.textContent = 'Checking ' + name + '.arc ...';
  priceInfo.textContent = '';
  durationRow.style.display = 'none';
  connectBtn.style.display = 'none';
  status.className = 'status';

  try {
    const readProvider = new ethers.JsonRpcProvider(RPC);
    const readRegistrar = new ethers.Contract(REGISTRAR, ABI, readProvider);
    const isAvailable = await readRegistrar.available(name);
    if (isAvailable) {
      badge.className = 'badge available';
      badge.textContent = name + '.arc — Available';
      durationRow.style.display = 'block';
      selectDuration(selectedYears);
      connectBtn.style.display = 'block';
      connectBtn.textContent = connected ? 'Register ' + name + '.arc' : 'Connect Wallet to Register';
    } else {
      badge.className = 'badge taken';
      badge.textContent = name + '.arc — Already Registered';
      priceInfo.textContent = '';
      durationRow.style.display = 'none';
      connectBtn.style.display = 'none';
    }
  } catch(e) {
    badge.className = 'badge checking';
    badge.textContent = 'Error checking name';
    showStatus('Error: ' + e.message, 'err');
  }
}

nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkName(); });

async function connect() {
  const eth = window.ethereum || window.rabby;
  if (!eth) { showStatus('No wallet found! Install MetaMask or Rabby', 'err'); return; }
  try {
    provider = new ethers.BrowserProvider(eth);
    const accounts = await eth.request({ method: 'eth_requestAccounts' });
    if (!accounts || accounts.length === 0) { showStatus('No accounts found!', 'err'); return; }
    const network = await provider.getNetwork();
    if (Number(network.chainId) !== ARC_CHAIN_ID) {
      try {
        await eth.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x4CEB12' }] });
      } catch(e) {
        await eth.request({ method: 'wallet_addEthereumChain', params: [{ chainId: '0x4CEB12', chainName: 'Arc Testnet', rpcUrls: ['https://rpc.testnet.arc.network'], nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 }, blockExplorerUrls: ['https://testnet.arcscan.app'] }] });
      }
      provider = new ethers.BrowserProvider(eth);
    }
    signer = await provider.getSigner();
    registrar = new ethers.Contract(REGISTRAR, ABI, signer);
    connected = true;
    const price = selectedYears === 1 ? '3 USDC' : '15 USDC';
    connectBtn.textContent = 'Register ' + currentName + '.arc — ' + price;
    connectBtn.onclick = register;
    showStatus('Wallet connected: ' + (await signer.getAddress()).slice(0,6) + '...', 'ok');
  } catch(e) { showStatus('Error: ' + e.message, 'err'); }
}

async function register() {
  const name = nameInput.value.trim().toLowerCase();
  if (!name || name.length < 3) { showStatus('Name too short', 'err'); return; }
  try {
    showStatus('Getting price...', 'info');
    const duration = selectedYears * 365 * 24 * 3600;
    const price = await registrar.rentPrice(name, duration);
    showStatus('Sending transaction...', 'info');
    const tx = await registrar.register(name, await signer.getAddress(), duration, { value: price });
    showStatus('Waiting for confirmation...', 'info');
    await tx.wait();
    showStatus('Registered! TX: ' + tx.hash.slice(0,10) + '...', 'ok');
    badge.className = 'badge taken';
    badge.textContent = name + '.arc — Registered!';
    durationRow.style.display = 'none';
    connectBtn.style.display = 'none';
  } catch(e) { showStatus('Error: ' + (e.reason || e.message), 'err'); }
}
</script>
</body>
</html>
