<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Name Service</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0b1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid #1e1a3a; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo svg { width: 40px; height: 40px; }
    .logo-text { font-size: 1.3rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .logo-text span { color: #a78bfa; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .my-names-btn { background: #1e1a3a; border: 1px solid #2d2060; color: #a78bfa; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; font-family: inherit; width: auto; transition: all 0.2s; }
    .my-names-btn:hover { background: #2d2060; transform: none; box-shadow: none; }
    .my-names-btn.hidden { display: none; }
    .header-connect-btn { background: linear-gradient(135deg, #7c3aed, #6d28d9); border: none; color: #fff; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; font-family: inherit; width: auto; transition: all 0.2s; }
    .header-connect-btn:hover { background: linear-gradient(135deg, #6d28d9, #5b21b6); transform: none; box-shadow: none; }
    .header-connect-btn.hidden { display: none; }
    .wallet-info { display: flex; align-items: center; gap: 10px; }
    .wallet-info.hidden { display: none; }
    .wallet-addr-header { color: #a78bfa; font-weight: 600; font-size: 0.9rem; }
    .disconnect-btn-header { background: none; border: 1px solid #ef4444; color: #ef4444; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-family: inherit; width: auto; }
    .disconnect-btn-header:hover { background: #2a0a0a; transform: none; box-shadow: none; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 12px; text-align: center; background: linear-gradient(135deg, #a78bfa, #7c3aed, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.sub { color: #6b7280; margin-bottom: 48px; font-size: 1.1rem; text-align: center; }
    .card { background: #13103a; border: 1px solid #2d2060; border-radius: 16px; padding: 36px; width: 100%; max-width: 500px; box-shadow: 0 0 60px rgba(124, 58, 237, 0.15); }
    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-row input { margin-bottom: 0; flex: 1; }
    .search-row button { width: auto; padding: 14px 20px; }
    input { width: 100%; padding: 14px 16px; background: #0d0b1a; border: 1px solid #2d2060; border-radius: 10px; color: #fff; font-size: 1rem; font-family: inherit; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15); }
    input::placeholder { color: #4b5563; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    button:hover { background: linear-gradient(135deg, #6d28d9, #5b21b6); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4); }
    .duration-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .duration-btn { flex: 1; padding: 12px; background: #0d0b1a; border: 1px solid #2d2060; border-radius: 10px; color: #6b7280; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .duration-btn:hover { transform: none; box-shadow: none; }
    .duration-btn.active { border-color: #7c3aed; color: #a78bfa; background: #1e1a3a; box-shadow: 0 0 0 1px #7c3aed; }
    .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-bottom: 16px; }
    .badge.available { background: #0a2a1a; border: 1px solid #10b981; color: #10b981; }
    .badge.taken { background: #2a0a0a; border: 1px solid #ef4444; color: #ef4444; }
    .badge.checking { background: #1e1a3a; border: 1px solid #7c3aed; color: #a78bfa; }
    .price { color: #a78bfa; font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .status { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; display: none; }
    .status.ok { background: #0a2a1a; border: 1px solid #10b981; color: #10b981; display: block; }
    .status.err { background: #2a0a0a; border: 1px solid #ef4444; color: #ef4444; display: block; }
    .status.info { background: #1e1a3a; border: 1px solid #7c3aed; color: #a78bfa; display: block; }
    .name-detail { margin-top: 16px; padding: 16px; background: #0d0b1a; border: 1px solid #2d2060; border-radius: 10px; display: none; }
    .name-detail.show { display: block; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e1a3a; font-size: 0.9rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #6b7280; }
    .detail-value { color: #fff; font-weight: 600; word-break: break-all; text-align: right; max-width: 60%; }
    .detail-value.purple { color: #a78bfa; }
    .detail-value.green { color: #10b981; }
    .detail-value.red { color: #ef4444; }
    .renew-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #1e1a3a; display: none; }
    .renew-section.show { display: block; }
    .renew-title { color: #6b7280; font-size: 0.85rem; margin-bottom: 8px; }
    .renew-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .renew-btn { flex: 1; padding: 10px; background: #0d0b1a; border: 1px solid #2d2060; border-radius: 8px; color: #6b7280; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
    .renew-btn:hover { transform: none; box-shadow: none; }
    .renew-btn.active { border-color: #7c3aed; color: #a78bfa; background: #1e1a3a; }
    .renew-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .renew-submit:hover { background: linear-gradient(135deg, #6d28d9, #5b21b6); transform: none; box-shadow: none; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #13103a; border: 1px solid #2d2060; border-radius: 16px; padding: 32px; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; position: relative; }
    .modal h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; color: #a78bfa; }
    .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #6b7280; font-size: 1.5rem; cursor: pointer; width: auto; padding: 0; }
    .modal-close:hover { color: #fff; transform: none; box-shadow: none; background: none; }
    .name-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: #0d0b1a; border: 1px solid #2d2060; border-radius: 10px; margin-bottom: 10px; }
    .name-item .name { font-weight: 700; color: #fff; font-size: 1rem; }
    .name-item .name span { color: #a78bfa; }
    .name-item .expiry { font-size: 0.78rem; color: #6b7280; margin-top: 4px; }
    .loading-names { text-align: center; color: #6b7280; padding: 24px; }
    .no-names { text-align: center; color: #6b7280; padding: 24px; }
    footer { text-align: center; padding: 24px; color: #4b5563; font-size: 0.85rem; border-top: 1px solid #1e1a3a; }
    footer a { color: #7c3aed; text-decoration: none; }
    footer a:hover { color: #a78bfa; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#c4b5fd"/>
            <stop offset="100%" style="stop-color:#7c3aed"/>
          </linearGradient>
        </defs>
        <path d="M20 4 L36 34 H28 L20 18 L12 34 H4 Z" fill="url(#g1)" opacity="0.9"/>
        <path d="M14 26 H26" stroke="url(#g1)" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">Arc <span>Name Service</span></span>
    </div>
    <div class="header-right">
      <button class="my-names-btn hidden" id="myNamesBtn" onclick="openMyNames()">My Names</button>
      <button class="header-connect-btn" id="headerConnectBtn" onclick="connect()">Connect Wallet</button>
      <div class="wallet-info hidden" id="walletInfo">
        <span class="wallet-addr-header" id="walletAddrHeader"></span>
        <button class="disconnect-btn-header" onclick="disconnect()">Disconnect</button>
      </div>
    </div>
  </header>

  <main>
    <h1>Your .arc Identity</h1>
    <p class="sub">Register your name on the Arc Network</p>
    <div class="card">
      <div class="search-row">
        <input id="nameInput" type="text" placeholder="search your name..." />
        <button onclick="checkName()" style="width:auto;padding:14px 20px;">Check</button>
      </div>
      <div id="badge" style="display:none"></div>
      <div class="name-detail" id="nameDetail">
        <div class="detail-row">
          <span class="detail-label">Owner</span>
          <span class="detail-value purple" id="detailOwner">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Expires</span>
          <span class="detail-value" id="detailExpiry">—</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Time Left</span>
          <span class="detail-value" id="detailTimeLeft">—</span>
        </div>
        <div class="renew-section" id="renewSection">
          <div class="renew-title">Renew this name</div>
          <div class="renew-row">
            <button class="renew-btn active" id="renewBtn1" onclick="selectRenew(1)">+1 Year — 3 USDC</button>
            <button class="renew-btn" id="renewBtn5" onclick="selectRenew(5)">+5 Years — 15 USDC</button>
          </div>
          <button class="renew-submit" onclick="renew()">Renew</button>
        </div>
      </div>
      <div id="durationRow" style="display:none; margin-top:16px;">
        <div class="duration-row">
          <button class="duration-btn active" id="btn1" onclick="selectDuration(1)">1 Year — 3 USDC</button>
          <button class="duration-btn" id="btn5" onclick="selectDuration(5)">5 Years — 15 USDC</button>
        </div>
      </div>
      <div class="price" id="priceInfo"></div>
      <button id="registerBtn" style="display:none" onclick="register()">Register Name</button>
      <div class="status" id="status"></div>
    </div>
  </main>

  <footer>
    Need testnet funds? <a href="https://faucet.circle.com" target="_blank">faucet.circle.com</a>
    &nbsp;·&nbsp;
    <a href="https://testnet.arcscan.app" target="_blank">Explorer</a>
    &nbsp;·&nbsp;
    <a href="https://x.com/0x_orwell" target="_blank">𝕏 @0x_orwell</a>
  </footer>

  <div class="modal-overlay" id="modalOverlay" onclick="closeMyNames(event)">
    <div class="modal">
      <button class="modal-close" onclick="closeMyNames()">✕</button>
      <h2>My .arc Names</h2>
      <div id="namesList"><div class="loading-names">Loading...</div></div>
    </div>
  </div>

<script>
const REGISTRAR = "0x326AEb1ce28552c27DC1046B98bB067aD6c2A327";
const REGISTRY = "0x8216cAde5A6196b2E4257945CEd53dd9D991400b";
const DEPLOY_BLOCK = 38256893;
const ARC_CHAIN_ID = 5042002;
const RPC = "https://rpc.testnet.arc.network";
const ABI = [
  "function rentPrice(string name, uint256 duration) view returns (uint256)",
  "function register(string name, address owner, uint256 duration) payable returns (bytes32)",
  "function renew(string name, uint256 duration) payable returns (uint256)",
  "function available(string name) view returns (bool)",
  "function expiry(string name) view returns (uint256)",
  "event NameRegistered(string name, bytes32 indexed node, address indexed owner, uint256 expires)"
];
const REGISTRY_ABI = ["function owner(bytes32 node) view returns (address)"];

let provider, signer, registrar, connected = false;
let selectedYears = 1;
let selectedRenewYears = 1;
let currentName = '';
let myAddress = '';
let currentOwner = '';

const nameInput = document.getElementById('nameInput');
const priceInfo = document.getElementById('priceInfo');
const registerBtn = document.getElementById('registerBtn');
const status = document.getElementById('status');
const badge = document.getElementById('badge');
const durationRow = document.getElementById('durationRow');
const nameDetail = document.getElementById('nameDetail');
const renewSection = document.getElementById('renewSection');
const myNamesBtn = document.getElementById('myNamesBtn');
const headerConnectBtn = document.getElementById('headerConnectBtn');
const walletInfo = document.getElementById('walletInfo');
const walletAddrHeader = document.getElementById('walletAddrHeader');

function showStatus(msg, type) { status.textContent = msg; status.className = 'status ' + type; }

function updateRegisterBtn() {
  if (!badge.textContent.includes('Available')) return;
  if (!connected) {
    registerBtn.textContent = 'Connect Wallet to Register';
    registerBtn.onclick = connect;
  } else {
    const price = selectedYears === 1 ? '3 USDC' : '15 USDC';
    registerBtn.textContent = 'Register ' + currentName + '.arc — ' + price;
    registerBtn.onclick = register;
  }
}

function disconnect() {
  provider = null; signer = null; registrar = null; connected = false; myAddress = '';
  headerConnectBtn.className = 'header-connect-btn';
  walletInfo.className = 'wallet-info hidden';
  myNamesBtn.className = 'my-names-btn hidden';
  renewSection.className = 'renew-section';
  updateRegisterBtn();
  showStatus('Disconnected', 'info');
}

function selectDuration(years) {
  selectedYears = years;
  document.getElementById('btn1').className = years === 1 ? 'duration-btn active' : 'duration-btn';
  document.getElementById('btn5').className = years === 5 ? 'duration-btn active' : 'duration-btn';
  const price = years === 1 ? '3 USDC' : '15 USDC';
  priceInfo.textContent = 'Total: ' + price;
  updateRegisterBtn();
}

function selectRenew(years) {
  selectedRenewYears = years;
  document.getElementById('renewBtn1').className = years === 1 ? 'renew-btn active' : 'renew-btn';
  document.getElementById('renewBtn5').className = years === 5 ? 'renew-btn active' : 'renew-btn';
}

function timeLeft(expires) {
  const now = Math.floor(Date.now() / 1000);
  const diff = expires - now;
  if (diff <= 0) return { text: 'Expired', cls: 'red' };
  const days = Math.floor(diff / 86400);
  if (days > 365) return { text: Math.floor(days/365) + ' years', cls: 'green' };
  if (days > 30) return { text: Math.floor(days/30) + ' months', cls: 'green' };
  return { text: days + ' days', cls: days < 30 ? 'red' : 'green' };
}

async function checkName() {
  const name = nameInput.value.trim().toLowerCase();
  if (!name || name.length < 3) {
    badge.style.display = 'none'; priceInfo.textContent = '';
    durationRow.style.display = 'none'; registerBtn.style.display = 'none';
    nameDetail.className = 'name-detail';
    showStatus('Min 3 characters', 'err'); return;
  }
  if (!/^[a-z0-9-]+$/.test(name)) { showStatus('Only lowercase letters, numbers, hyphens', 'err'); return; }
  currentName = name;
  badge.style.display = 'block';
  badge.className = 'badge checking';
  badge.textContent = 'Checking ' + name + '.arc ...';
  priceInfo.textContent = ''; durationRow.style.display = 'none';
  registerBtn.style.display = 'none'; status.className = 'status';
  nameDetail.className = 'name-detail';
  renewSection.className = 'renew-section';

  try {
    const readProvider = new ethers.JsonRpcProvider(RPC);
    const readRegistrar = new ethers.Contract(REGISTRAR, ABI, readProvider);
    const isAvailable = await readRegistrar.available(name);

    if (isAvailable) {
      badge.className = 'badge available';
      badge.textContent = name + '.arc — Available';
      durationRow.style.display = 'block';
      selectDuration(selectedYears);
      registerBtn.style.display = 'block';
      updateRegisterBtn();
    } else {
      badge.className = 'badge taken';
      badge.textContent = name + '.arc — Registered';
      try {
        const expires = Number(await readRegistrar.expiry(name));
        const expiryDate = new Date(expires * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        const tl = timeLeft(expires);
        const node = ethers.keccak256(ethers.solidityPacked(
          ['bytes32', 'bytes32'],
          [ethers.keccak256(ethers.solidityPacked(['bytes32', 'bytes32'],
            [ethers.ZeroHash, ethers.keccak256(ethers.toUtf8Bytes('arc'))])),
           ethers.keccak256(ethers.toUtf8Bytes(name))]
        ));
        const registry = new ethers.Contract(REGISTRY, REGISTRY_ABI, readProvider);
        currentOwner = await registry.owner(node);
        const ownerShort = currentOwner.slice(0,6) + '...' + currentOwner.slice(-4);
        document.getElementById('detailOwner').textContent = ownerShort;
        document.getElementById('detailExpiry').textContent = expiryDate;
        const tlEl = document.getElementById('detailTimeLeft');
        tlEl.textContent = tl.text;
        tlEl.className = 'detail-value ' + tl.cls;
        nameDetail.className = 'name-detail show';

        // Eğer bağlı cüzdan owner ise Renew göster
        if (connected && myAddress.toLowerCase() === currentOwner.toLowerCase()) {
          renewSection.className = 'renew-section show';
        }
      } catch(e) {
        nameDetail.className = 'name-detail';
      }
    }
  } catch(e) {
    badge.className = 'badge checking';
    badge.textContent = 'Error checking name';
    showStatus('Error: ' + e.message, 'err');
  }
}

nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkName(); });

async function connect() {
  const eth = window.ethereum || window.rabby;
  if (!eth) { showStatus('No wallet found! Install MetaMask or Rabby', 'err'); return; }
  try {
    provider = new ethers.BrowserProvider(eth);
    const accounts = await eth.request({ method: 'eth_requestAccounts' });
    if (!accounts || accounts.length === 0) { showStatus('No accounts found!', 'err'); return; }
    const network = await provider.getNetwork();
    if (Number(network.chainId) !== ARC_CHAIN_ID) {
      try {
        await eth.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x4cef52' }] });
      } catch(e) {
        await eth.request({ method: 'wallet_addEthereumChain', params: [{ chainId: '0x4cef52', chainName: 'Arc Testnet', rpcUrls: ['https://rpc.testnet.arc.network'], nativeCurrency: { name: 'USDC', symbol: 'USDC', decimals: 18 }, blockExplorerUrls: ['https://testnet.arcscan.app'] }] });
      }
      provider = new ethers.BrowserProvider(eth);
    }
    signer = await provider.getSigner();
    registrar = new ethers.Contract(REGISTRAR, ABI, signer);
    connected = true;
    myAddress = await signer.getAddress();
    walletAddrHeader.textContent = myAddress.slice(0,6) + '...' + myAddress.slice(-4);
    headerConnectBtn.className = 'header-connect-btn hidden';
    walletInfo.className = 'wallet-info';
    myNamesBtn.className = 'my-names-btn';
    updateRegisterBtn();
    // Eğer isim detayı açıksa ve owner ise renew göster
    if (nameDetail.className.includes('show') && currentOwner && myAddress.toLowerCase() === currentOwner.toLowerCase()) {
      renewSection.className = 'renew-section show';
    }
    showStatus('Wallet connected!', 'ok');
    eth.on('accountsChanged', (accounts) => {
      if (accounts.length === 0) disconnect();
      else { myAddress = accounts[0]; walletAddrHeader.textContent = accounts[0].slice(0,6) + '...' + accounts[0].slice(-4); }
    });
  } catch(e) { showStatus('Error: ' + e.message, 'err'); }
}

async function register() {
  const name = nameInput.value.trim().toLowerCase();
  if (!name || name.length < 3) { showStatus('Name too short', 'err'); return; }
  if (!connected) { connect(); return; }
  try {
    showStatus('Getting price...', 'info');
    const duration = selectedYears * 365 * 24 * 3600;
    const price = await registrar.rentPrice(name, duration);
    showStatus('Sending transaction...', 'info');
    const tx = await registrar.register(name, await signer.getAddress(), duration, { value: price });
    showStatus('Waiting for confirmation...', 'info');
    await tx.wait();
    showStatus('Registered! TX: ' + tx.hash.slice(0,10) + '...', 'ok');
    checkName();
  } catch(e) { showStatus('Error: ' + (e.reason || e.message), 'err'); }
}

async function renew() {
  if (!connected) { connect(); return; }
  try {
    showStatus('Getting price...', 'info');
    const duration = selectedRenewYears * 365 * 24 * 3600;
    const price = await registrar.rentPrice(currentName, duration);
    showStatus('Sending transaction...', 'info');
    const tx = await registrar.renew(currentName, duration, { value: price });
    showStatus('Waiting for confirmation...', 'info');
    await tx.wait();
    showStatus('Renewed! TX: ' + tx.hash.slice(0,10) + '...', 'ok');
    checkName();
  } catch(e) { showStatus('Error: ' + (e.reason || e.message), 'err'); }
}

async function openMyNames() {
  document.getElementById('modalOverlay').className = 'modal-overlay show';
  document.getElementById('namesList').innerHTML = '<div class="loading-names">Loading your names...</div>';
  try {
    const readProvider = new ethers.JsonRpcProvider(RPC);
    const readRegistrar = new ethers.Contract(REGISTRAR, ABI, readProvider);
    const latest = await readProvider.getBlockNumber();
    const allEvents = [];
    const chunkSize = 9000;
    for (let from = DEPLOY_BLOCK; from <= latest; from += chunkSize) {
      const to = Math.min(from + chunkSize - 1, latest);
      const filter = readRegistrar.filters.NameRegistered(null, null, myAddress);
      const chunk = await readRegistrar.queryFilter(filter, from, to);
      allEvents.push(...chunk);
    }
    if (allEvents.length === 0) {
      document.getElementById('namesList').innerHTML = '<div class="no-names">No .arc names found for this wallet.</div>';
      return;
    }
    let html = '';
    const now = Math.floor(Date.now() / 1000);
    for (const e of allEvents) {
      const name = e.args[0];
      const expires = Number(e.args[3]);
      const expiryDate = new Date(expires * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
      const tl = timeLeft(expires);
      html += '<div class="name-item"><div>';
      html += '<div class="name">' + name + '<span>.arc</span></div>';
      html += '<div class="expiry">Expires: ' + expiryDate + ' · <span style="color:' + (tl.cls === 'green' ? '#10b981' : '#ef4444') + '">' + tl.text + '</span></div>';
      html += '</div></div>';
    }
    document.getElementById('namesList').innerHTML = html;
  } catch(e) {
    document.getElementById('namesList').innerHTML = '<div class="no-names">Error: ' + e.message + '</div>';
  }
}

function closeMyNames(event) {
  if (!event || event.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').className = 'modal-overlay';
  }
}
</script>
</body>
</html>
